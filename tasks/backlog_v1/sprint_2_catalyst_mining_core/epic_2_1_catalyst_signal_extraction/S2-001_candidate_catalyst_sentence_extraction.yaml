task_id: "S2-001"
task_name: "候选催化句抽取"
sprint: "Sprint 2 潜在题材催化结构化挖掘核心"
epic: "Epic 2.1 Catalyst Signal Extraction"
story_id: "S2-001"
blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "从标准化资讯和事件中抽取可能代表催化的证据句。"
business_value: "没有可信的候选催化句，就没有后续题材挖掘。"

entry_criteria:
  - "Sprint 1 的资讯标准化和事件准备已完成。"

acceptance_criteria:
  - "每条候选催化句都保留原始来源和位置。"
  - "候选催化句输出包含 sentence_id、source_ref、evidence_text。"
  - "明显无效的说明性句子会被过滤。"
  - "结果可供后续催化类型分类直接消费。"

constraints:
  - "必须保留可追溯证据，不允许生成无来源句子。"

out_of_scope:
  - "不做题材聚合。"

dependencies:
  - "S1-003"
  - "S1-004"

related_files:
  - "agents/runtime/normalize/agent.py"
  - "packages/schema/models.py"
  - "packages/schema/state.py"

primary_files:
  - "packages/schema/models.py"
  - "packages/schema/state.py"

secondary_files:
  - "agents/runtime/normalize/agent.py"

story_inputs:
  - "带来源引用和句子定位信息的标准化资讯。"
  - "Sprint 1 认知链路产出的归一事件上下文。"
  - "区分证据句与说明性句子的过滤标准。"

story_process:
  - "从标准化内容和事件证据中抽取候选催化句。"
  - "为每条候选句补齐 sentence_id、source_ref 和 evidence_text。"
  - "过滤无法支撑后续催化挖掘的弱说明性句子。"

story_outputs:
  - "一组带可追溯证据的候选催化句集合。"
  - "可直接进入催化类型分类的句级记录。"

verification_basis:
  - "对照输入资讯与抽取样本，确认候选句可以回溯到原始证据。"
  - "检查每条输出都包含 sentence_id、source_ref 和 evidence_text。"
  - "检查明显不构成催化的说明性句子被排除。"
test_cases:
  normal:
    - "有效资讯可抽取出候选催化句。"
  exception:
    - "无证据来源的句子不会进入结果集。"


