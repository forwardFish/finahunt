  - "packages/schema/state.py"

secondary_files:
  - "packages/schema/models.py"

story_inputs:
  - "观察池命中结果和排序结果流。"
  - "观察池事件输出页的字段结构要求。"
  - "观察池对象、题材、证据与时间信息。"

story_process:
  - "围绕用户观察池整理相关事件输出。"
  - "按观察对象聚合相关主题、事件和催化说明。"
  - "生成适合观察池页面消费的结构化结果。"

