blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "对事件催化做类型识别和强弱分级。"
business_value: "让用户快速判断事件的强度和时效性。"

entry_criteria:
  - "S1-005 已完成。"

acceptance_criteria:
  - "至少支持政策、业绩、产业、资金、舆情五类催化。"
  - "每条催化结果包含等级或强弱标记。"
  - "分级依据可解释。"
  - "不能识别时不会强行输出等级。"

constraints:
  - "不做复杂预测。"

out_of_scope:
  - "不做历史相似案例。"

dependencies:
  - "S1-005"

related_files:
  - "config/rules/standards.yaml"
  - "agents/governance/evaluation/agent.py"

primary_files:
  - "config/rules/standards.yaml"
  - "agents/governance/evaluation/agent.py"

secondary_files:
  - "packages/schema/models.py"

story_inputs:
  - "已完成题材识别的事件结果。"
  - "催化类型、强弱分级和合规边界规则。"
  - "事件中的时间、力度、来源可靠性等判断线索。"

story_process:
  - "识别事件中的催化类型并执行强弱分级。"
  - "为催化结果保留解释理由和证据引用。"
  - "对证据不足的情况保留未知或弱催化，而不是强行定级。"

story_outputs:
  - "带催化类型和等级的事件结果。"
  - "可供后续资产关联与用户排序使用的催化信号。"

verification_basis:
  - "检查输出结果包含催化类型与强弱等级。"
  - "检查催化判断保留可解释原因。"
  - "检查模糊或弱证据不会被错误标记为强催化。"

test_cases:
  normal:
    - "典型事件可得到催化类型和强弱等级。"
  exception:
    - "证据不足的事件不会给出伪精确等级。"
