task_id: "S1-007"
task_name: "个股与板块客观关联"
sprint: "Sprint 1 事件认知闭环 MVP"
epic: "Epic 1.2 Theme and Linkage"
story_id: "S1-007"
blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "把事件、题材、个股和板块之间的客观关联关系组织出来。"
business_value: "让用户知道某个题材对应哪些标的，以及关联依据是什么。"

entry_criteria:
  - "S1-005 和 S1-006 已完成。"

acceptance_criteria:
  - "事件可关联到个股或板块对象。"
  - "每个关联都带关联理由或证据。"
  - "区分直接关联和弱关联。"
  - "输出结构可供排序和页面展示直接使用。"

constraints:
  - "不能给出主观推荐表达。"

out_of_scope:
  - "不做收益预测。"

dependencies:
  - "S1-005"
  - "S1-006"

related_files:
  - "packages/schema/models.py"
  - "agents/governance/evaluation/agent.py"
  - "config/rules/compliance_rules.yaml"

primary_files:
  - "packages/schema/models.py"
  - "agents/governance/evaluation/agent.py"

secondary_files:
  - "config/rules/compliance_rules.yaml"

story_inputs:
  - "带题材和催化结果的事件对象。"
  - "个股、板块、产业链环节之间的客观映射规则。"
  - "合规规则中关于客观关联和禁止臆测的边界。"

story_process:
  - "根据客观证据把事件、题材与个股、板块做关联。"
  - "区分强关联与弱关联，避免无依据绑定。"
  - "为每条关联保留来源和 linkage reason。"

story_outputs:
  - "带个股和板块客观关联的事件/题材结果。"
  - "可供用户排序和后续输出使用的关联资产信息。"

verification_basis:
  - "检查代表性事件可以关联到合理的个股或板块。"
  - "检查每条关联都带有客观依据说明。"
  - "检查证据不足时不会生成无根据的资产绑定。"

test_cases:
  normal:
    - "事件能关联到标的或板块并给出依据。"
  exception:
    - "证据不足时不会强行绑定个股。"
