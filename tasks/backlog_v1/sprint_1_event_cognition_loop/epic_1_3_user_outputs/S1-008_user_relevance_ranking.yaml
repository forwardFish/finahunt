task_id: "S1-008"
task_name: "用户相关度排序"
sprint: "Sprint 1 事件认知闭环 MVP"
epic: "Epic 1.3 User Outputs"
story_id: "S1-008"
blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "根据用户观察池和关注题材对事件做相关度排序。"
business_value: "让用户优先看到对自己最有价值的事件。"

entry_criteria:
  - "S1-004 到 S1-007 已完成。"

acceptance_criteria:
  - "同一批事件可按用户关注对象重排。"
  - "排序结果可解释，至少包含排序依据摘要。"
  - "没有观察池时也能返回默认排序。"
  - "排序结果可直接用于今日重点页。"

constraints:
  - "不做复杂推荐模型。"

out_of_scope:
  - "不做通知推送。"

dependencies:
  - "S1-004"
  - "S1-007"

related_files:
  - "agents/governance/evaluation/agent.py"
  - "packages/schema/state.py"
  - "config/spec/traceability.yaml"

primary_files:
  - "agents/governance/evaluation/agent.py"
  - "packages/schema/state.py"

secondary_files:
  - "config/spec/traceability.yaml"

story_inputs:
  - "带题材、催化和资产关联的事件结果。"
  - "用户观察池、关注题材和偏好配置。"
  - "相关度排序规则与解释因子。"

story_process:
  - "根据观察池和关注题材计算每条结果的相关度分值。"
  - "按分值对结果进行排序并保留排序原因。"
  - "让高相关结果优先进入用户可见输出。"

story_outputs:
  - "带相关度分值和排序位置的结果列表。"
  - "可供今日重点页和观察池输出继续消费的排序结果。"

verification_basis:
  - "检查结果会根据用户关注对象和题材偏好产生排序差异。"
  - "检查输出包含分值或排序依据。"
  - "检查更高相关的结果排在更前位置。"

test_cases:
  normal:
    - "同一批事件可生成对不同用户不同的排序结果。"
  exception:
    - "缺少用户偏好时返回默认排序，不报错。"
