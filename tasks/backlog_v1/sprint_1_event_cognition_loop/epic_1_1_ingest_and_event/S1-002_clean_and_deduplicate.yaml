task_id: "S1-002"
task_name: "资讯清洗与去重"
sprint: "Sprint 1 事件认知闭环 MVP"
epic: "Epic 1.1 Ingest and Event"
story_id: "S1-002"
blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "把原始资讯清洗成标准化资讯，并消除明显重复内容。"
business_value: "减少噪音，让后续事件抽取更稳定。"

entry_criteria:
  - "S1-001 已完成。"

acceptance_criteria:
  - "normalize 流程会输出 normalized news item。"
  - "明显重复内容被折叠或标记。"
  - "标准化输出包含 summary、url、source_id、published_at。"
  - "被过滤和被保留的记录都有审计信息。"

constraints:
  - "不在这个 Story 里做事件抽取。"

out_of_scope:
  - "不做主题识别。"

dependencies:
  - "S1-001"

related_files:
  - "agents/runtime/normalize/agent.py"
  - "skills/normalize/formatter.py"
  - "packages/schema/models.py"

primary_files:
  - "agents/runtime/normalize/agent.py"
  - "skills/normalize/formatter.py"

secondary_files:
  - "packages/schema/models.py"

story_inputs:
  - "S1-001 产出的原始资讯列表。"
  - "标准化资讯契约和基础字段清洗规则。"
  - "明显重复内容的判定与去重标准。"

story_process:
  - "对原始资讯做字段清洗、格式统一和内容标准化。"
  - "识别并去除明显重复或高度重复的资讯记录。"
  - "保留来源、时间和证据片段，避免清洗后失去可追溯性。"

story_outputs:
  - "一批去重后的标准化资讯对象。"
  - "可供事件抽取直接消费的 normalized documents。"

verification_basis:
  - "检查输出符合 NormalizedNewsItem 结构。"
  - "检查明显重复资讯不会重复进入下游。"
  - "检查标准化后仍保留来源和时间等可追溯字段。"

test_cases:
  normal:
    - "重复资讯只保留一条主记录。"
  exception:
    - "缺失标题或来源的资讯会被过滤或标记异常。"
