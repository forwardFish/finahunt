registry_version: "2026.03"
default_schedule: "0 */1 * * *"
sources:
  - source_id: "cninfo-announcement"
    source_name: "巨潮资讯公告"
    channel_type: "exchange"
    status: "active"
    in_mvp_chain: true
    description: "A 股上市公司公告主入口，用于识别停复牌、增减持、重大合同、并购重组等催化。"
    base_url: "https://www.cninfo.com.cn/"
    refresh_strategy:
      cron: "0 */1 * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "company_code"
        - "security_name"
        - "attachment_url"
      parser_key: "exchange_announcement"
    legality_evidence: "Official public disclosure platform for listed company announcements."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "60/hour"
      notes: "Use conservative polling; do not bypass public access controls."
    risk_level: "low"
  - source_id: "sse-disclosure"
    source_name: "上交所披露"
    channel_type: "exchange"
    status: "active"
    in_mvp_chain: true
    description: "用于补充交易所层面的公司公告与监管披露。"
    base_url: "https://www.sse.com.cn/"
    refresh_strategy:
      cron: "15 */1 * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "stock_code"
        - "industry"
      parser_key: "exchange_disclosure"
    legality_evidence: "Official exchange disclosure platform."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "60/hour"
      notes: "Prefer official JSON/XML endpoints where available."
    risk_level: "low"
  - source_id: "csrc-press"
    source_name: "证监会新闻发布"
    channel_type: "regulator"
    status: "active"
    in_mvp_chain: true
    description: "监管发布与政策表态来源，用于识别制度、政策类催化。"
    base_url: "https://www.csrc.gov.cn/"
    refresh_strategy:
      cron: "30 */2 * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "policy_scope"
        - "agency_department"
      parser_key: "regulator_press"
    legality_evidence: "Official regulator site and public publication channel."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "30/hour"
      notes: "Treat as policy evidence source, not trading advice."
    risk_level: "low"
  - source_id: "authorized-fastfeed"
    source_name: "授权快讯源"
    channel_type: "authorized_feed"
    status: "paused"
    in_mvp_chain: false
    description: "保留给后续扩展的授权快讯订阅源，MVP 默认不启用。"
    base_url: "https://example.com/feed"
    refresh_strategy:
      cron: "*/10 * * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 5
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "headline_score"
        - "symbol_mentions"
      parser_key: "authorized_fastfeed"
    legality_evidence: "Contract required before enabling in production."
    access_profile:
      robots_respected: true
      auth_mode: "api_key"
      rate_limit: "120/hour"
      notes: "Must not be activated without signed commercial contract."
    risk_level: "medium"
