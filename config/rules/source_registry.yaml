registry_version: "2026.03.16"
default_schedule: "*/30 * * * *"
sources:
  - source_id: "cls-telegraph"
    source_name: "财联社电报"
    channel_type: "public_site"
    status: "active"
    in_mvp_chain: true
    description: "公开快讯流，优先用于盘中/盘后最新催化和市场异动线索。"
    base_url: "https://www.cls.cn/telegraph"
    refresh_strategy:
      cron: "*/10 * * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "stock_list"
        - "plate_list"
        - "brief"
      parser_key: "cls_telegraph_html"
    legality_evidence: "Publicly accessible telegraph page. MVP only captures title, summary, evidence snippet, and source URL."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "30/hour"
      notes: "Use conservative polling and store only traceable excerpts."
    risk_level: "medium"
  - source_id: "jiuyangongshe-live"
    source_name: "韭研公社短文"
    channel_type: "public_site"
    status: "active"
    in_mvp_chain: true
    description: "公开短文/热度页，用于补充社区讨论中的题材催化线索。"
    base_url: "https://www.jiuyangongshe.com/live"
    refresh_strategy:
      cron: "*/20 * * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "community_heat"
        - "stock_list"
      parser_key: "jiuyangongshe_live_html"
    legality_evidence: "Publicly accessible live page. MVP only captures visible title, visible text excerpt, timestamp, and page URL."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "20/hour"
      notes: "Only retain posts that pass finance relevance and objective-content filters."
    risk_level: "medium"
  - source_id: "cninfo-announcement"
    source_name: "巨潮资讯公告"
    channel_type: "exchange"
    status: "paused"
    in_mvp_chain: false
    description: "上市公司公告来源，后续用于补充客观披露证据。"
    base_url: "https://www.cninfo.com.cn/"
    refresh_strategy:
      cron: "0 */1 * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "company_code"
        - "security_name"
        - "attachment_url"
      parser_key: "exchange_announcement"
    legality_evidence: "Official public disclosure platform for listed company announcements."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "60/hour"
      notes: "Prefer official APIs or public interfaces when Sprint 2 extends evidence sources."
    risk_level: "low"
  - source_id: "csrc-press"
    source_name: "证监会新闻发布"
    channel_type: "regulator"
    status: "paused"
    in_mvp_chain: false
    description: "监管政策来源，后续用于补充政策催化证据。"
    base_url: "https://www.csrc.gov.cn/"
    refresh_strategy:
      cron: "30 */2 * * *"
      timezone: "Asia/Shanghai"
      retry_policy: "exponential_backoff"
      max_retries: 3
    field_contract:
      required_fields:
        - "title"
        - "summary"
        - "published_at"
        - "source_url"
      optional_fields:
        - "policy_scope"
        - "agency_department"
      parser_key: "regulator_press"
    legality_evidence: "Official regulator site and public publication channel."
    access_profile:
      robots_respected: true
      auth_mode: "public"
      rate_limit: "30/hour"
      notes: "Treat as objective policy evidence source only."
    risk_level: "low"
