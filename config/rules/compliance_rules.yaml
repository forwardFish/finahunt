compliance_policy:
  name: "compliance-first"
  description: "All outputs must remain objective, traceable, and within approved source and field scope."
  objective_output_required: true
  require_source_disclosure: true
  require_risk_notice: true
  allowed_event_statuses:
    - "NEW"
    - "VERIFIED"
    - "RISING"
    - "REIGNITED"
    - "REALIZED"

source_whitelist_policy:
  allowed_classes:
    - "regulator"
    - "exchange"
    - "authorized_feed"
    - "public_site"
  require_legality_evidence: true
  deny_if_source_unknown: true

field_capture_policy:
  allowed_fields:
    - "title"
    - "summary"
    - "published_at"
    - "source_name"
    - "source_url"
    - "evidence_snippet"
    - "tags"
    - "metadata"
  forbidden_fields:
    - "full_paid_report"
    - "private_user_data"
    - "account_credentials"

event_output_policy:
  required_fields:
    - "event_id"
    - "title"
    - "event_type"
    - "source_refs"
    - "evidence_refs"
    - "status"
  require_source_refs: true
  require_evidence_refs: true

blocking_rules:
  blocked_terms:
    - "买入建议"
    - "收益承诺"
    - "内幕消息"
    - "稳赚不赔"
    - "拉群"
    - "荐股"
  blocked_behaviors:
    - "crawl_unlicensed_source"
    - "store_sensitive_secrets_in_logs"
    - "emit_untraceable_event"

information_quality_policy:
  minimum_title_length: 6
  minimum_summary_length: 20
  finance_keywords:
    - "公司"
    - "公告"
    - "业绩"
    - "订单"
    - "中标"
    - "涨停"
    - "板块"
    - "概念"
    - "政策"
    - "机器人"
    - "算力"
    - "半导体"
    - "新能源"
    - "低空"
    - "AI"
    - "并购"
    - "减持"
    - "增持"
  low_signal_phrases:
    - "晚安"
    - "早安"
    - "打卡"
    - "自律"
    - "分享一句话"
    - "心情"
    - "鸡汤"
  require_any_of:
    - "finance_keyword"
    - "stock_code"
    - "theme_keyword"

manual_review_policy:
  trigger_if_risk_level_in:
    - "high"
  trigger_if_blocked_documents_gt: 0
  required_record_fields:
    - "correction_id"
    - "target_stage"
    - "target_field"
    - "reason"
    - "operator"
