canonical_sources:
  final_product_spec: "docs/FINAL_PRODUCT_SPEC.md"
  docs_readme: "docs/README.md"
  source_registry: "config/rules/source_registry.yaml"
  compliance_rules: "config/rules/compliance_rules.yaml"
  schema_models: "packages/schema/models.py"
  runtime_workflow: "workflows/runtime_schedule.py"
  web_app: "apps/web/package.json"

goals:
  sprint0_foundation:
    description: "Information foundation, schema, runtime trace, and final gate baseline."
    config_refs:
      - "config/rules/source_registry.yaml"
      - "config/rules/compliance_rules.yaml"
      - "config/spec/traceability.yaml"
      - "config/spec/gate_registry.yaml"
    test_refs:
      - "tests/spec/test_traceability_registry.py"
      - "tests/spec/test_gate_check.py"
      - "tests/integration/test_runtime_foundation.py"
      - "tests/e2e/test_final_gate.py"
  runtime_plane:
    description: "source runtime -> compliance guard -> normalize -> source audit traceable chain."
    config_refs:
      - "graphs/runtime_graph.py"
      - "workflows/runtime_schedule.py"
      - "packages/schema/models.py"
      - "packages/schema/state.py"
    test_refs:
      - "tests/integration/test_runtime_foundation.py"
  manual_governance:
    description: "manual correction, approval records, and final gate boundaries."
    config_refs:
      - "agents/approval/checkpoint.py"
      - "agents/final_gate/agent.py"
    test_refs:
      - "tests/e2e/test_final_gate.py"

stories:
  S0-001:
    description: "compliant source registry"
    owned_files: ["config/rules/source_registry.yaml"]
    downstream_reuse: ["agents/runtime/source_runtime/agent.py"]
  S0-002:
    description: "unified data contracts"
    owned_files: ["packages/schema/models.py", "packages/schema/state.py"]
    downstream_reuse: ["agents/runtime/normalize/agent.py"]
  S0-003:
    description: "compliance output and final gate"
    owned_files: ["packages/schema/models.py", "config/rules/compliance_rules.yaml"]
    downstream_reuse: ["agents/runtime/compliance_guard/agent.py", "agents/final_gate/agent.py"]
  S0-004:
    description: "traceability and gate registry baseline"
    owned_files: ["config/spec/traceability.yaml", "config/spec/gate_registry.yaml"]
    downstream_reuse: ["tools/gate_check/validate_norms.py"]
  S0-005:
    description: "runtime graph scheduling baseline"
    owned_files: ["graphs/runtime_graph.py", "workflows/runtime_schedule.py"]
    downstream_reuse: ["tests/integration/test_runtime_foundation.py"]
  S0-006:
    description: "manual checkpoint and final gate acceptance"
    owned_files: ["agents/approval/checkpoint.py", "agents/final_gate/agent.py"]
    downstream_reuse: ["tests/e2e/test_final_gate.py"]

boundaries:
  human_roles:
    description: "high-risk output requires manual correction and final gate review"
    enforced_by: ["agents/approval/checkpoint.py", "agents/final_gate/agent.py"]
  agent_roles:
    description: "runtime agents output compliant, traceable, evidence-bound results"
    enforced_by: ["config/rules/compliance_rules.yaml", "packages/schema/models.py"]
  three_plane:
    description: "build, runtime, and governance planes remain separated"
    enforced_by: ["graphs/build_graph.py", "graphs/runtime_graph.py", "graphs/governance_graph.py"]
