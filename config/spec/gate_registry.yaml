gates:
  - gate_id: "vision_to_mvp"
    description: "Final product spec is the current source of truth before implementation acceptance."
    required_files:
      - "docs/FINAL_PRODUCT_SPEC.md"
      - "docs/README.md"
      - "apps/web/package.json"
      - "pyproject.toml"
    input_contracts: ["vision", "mvp_scope"]
    output_artifacts: ["aligned_scope_report"]
    blocking_conditions: ["canonical source missing", "goal mapping missing"]
  - gate_id: "mvp_to_runtime"
    description: "Runtime requires source registry, schema, traceability, and compliance rules."
    required_files:
      - "config/rules/source_registry.yaml"
      - "config/rules/compliance_rules.yaml"
      - "packages/schema/models.py"
      - "config/spec/traceability.yaml"
    input_contracts: ["source_registry", "raw_document_schema", "compliance_policy"]
    output_artifacts: ["runtime_ready_contract"]
    blocking_conditions: ["missing registry fields", "missing schema field", "traceability missing"]
  - gate_id: "runtime_to_manual_review"
    description: "Runtime audit and high-risk output require manual correction records."
    required_files:
      - "agents/approval/checkpoint.py"
      - "agents/runtime/source_audit/agent.py"
    input_contracts: ["runtime_audit_log", "blocked_documents"]
    output_artifacts: ["manual_correction_record", "approval_record"]
    manual_intervention_required: true
    blocking_conditions: ["high risk output without manual correction", "blocked documents unresolved"]
  - gate_id: "manual_review_to_final_acceptance"
    description: "Final gate decides PASS or BLOCKED from evaluation, audit, and correction state."
    required_files:
      - "agents/final_gate/agent.py"
      - "tests/e2e/test_final_gate.py"
      - "tests/integration/test_build_workflow.py"
    input_contracts: ["evaluation_report", "runtime_audit_log", "manual_correction_record"]
    output_artifacts: ["final_gate_decision", "rule_check_matrix", "final_gate_artifact"]
    blocking_conditions: ["final gate decision missing", "manual correction required but absent"]
