version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finahunt
      POSTGRES_USER: finahunt
      POSTGRES_PASSWORD: finahunt_local
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finahunt -d finahunt"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - finahunt-postgres-data:/var/lib/postgresql/data

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    command: python -m pytest
    working_dir: /app

  temporal:
    build:
      context: ..
      dockerfile: docker/Dockerfile.temporal

volumes:
  finahunt-postgres-data:
